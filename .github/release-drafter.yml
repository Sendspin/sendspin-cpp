name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Breaking Changes"
    label: "breaking change"
  - title: "Dependencies"
    collapse-after: 1
    labels:
      - "dependencies"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "breaking change"
      - "minor"
      - "enhancement"
  patch:
    labels:
      - "bug"
      - "bugfix"
      - "dependencies"
      - "documentation"
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
