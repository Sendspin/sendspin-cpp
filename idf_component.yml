## IDF Component Manager Manifest File
name: "sendspin-cpp"
dependencies:
  idf: ">=5.1"
  espressif/esp_websocket_client: ">=1.0.0"
  bblanchon/arduinojson: ">=7.4.0"
  micro-flac:
    git: https://github.com/esphome-libs/micro-flac.git
    rules:
      - if: "$CONFIG{SENDSPIN_CPP_ENABLE_PLAYER} == True"
  esphome/micro-opus:
    version: ">=0.3.5"
    rules:
      - if: "$CONFIG{SENDSPIN_CPP_ENABLE_PLAYER} == True"
description: "Sendspin synchronized audio streaming client for ESP32"
license: "Apache-2.0"
maintainers:
  - Kevin Ahrendt <kevin.ahrendt@openhomefoundation.org>
version: "0.1.0"
url: https://github.com/esphome-libs/sendspin-cpp
repository: https://github.com/esphome-libs/sendspin-cpp.git
files:
  exclude:
    - ".claude/**"
    - ".github/**"
    - ".clang-*"
    - ".clangd"
    - ".markdownlint.yaml"
    - ".pre-commit-config.yaml"
    - "examples/**"
    - "test/**"
    - "script/**"
    - "CLAUDE.md"
